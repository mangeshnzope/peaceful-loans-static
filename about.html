    <h1>About Peaceful-Loans</h1>
    <p style="margin-top:1.25rem">A boutique advisory that works exclusively for you — not the bank, not the builder.</p>
  </div>
</div>

<div class="about-content" style="display:flex;flex-direction:column;gap:2.5rem">
  <div class="blockquote">
    ${tricolorVHTML(12)}
    <p>"I started Peaceful-Loans after a decade in high-finance because I saw my own friends getting fleeced by 'relationship managers' they trusted."</p>
  </div>

  <div class="about-text">
    <p>We are not a tech platform that aggregates loans. We are a boutique advisory that represents you. We are the modern advocates of your debt — ensuring every paisa is accounted for and every risk is mitigated.</p>
    <p>The financial industry is built on asymmetric information. Banks know the fine print; you don't. Builders know the delay clauses; you don't. Our job is to level the playing field — permanently, at every step of your loan journey.</p>
    <p>Unlike traditional brokers, we do not let commissions earned by banks cloud our judgement. At our scale, all major banks give us the same commission — so there is zero financial incentive for us to push you towards any specific lender.</p>
    <p>We don't work for the bank. We don't work for the builder. We work for you.</p>
  </div>

    </div>

</div>

${ctaSectionHTML()}
${footerHTML()}
