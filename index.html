      if (ci < conv.customer.length) {

        customerText = conv.customer.slice(0, ci);
        renderPhone();
        timers.push(setTimeout(typeCustomer, SPEED));

          phase = 'dots';
          renderPhone();

            function typeAdvisor() {
              if (ai < conv.advisor.length) {
                ai++;
                advisorText = conv.advisor.slice(0, ai);
                renderPhone();
                timers.push(setTimeout(typeAdvisor, SPEED));
              } else {
                phase = 'hold';
                renderPhone();
                timers.push(setTimeout(() => {
                  phase = 'fade';
                  renderPhone();
                  timers.push(setTimeout(() => {
                    convIndex = (convIndex + 1) % conversations.length;
                    runConversation();
                  }, 700));
                }, 4000));
              }
            }
            typeAdvisor();
          }, 1800));
        }, 400));
      }
    }
    typeCustomer();
  }

  renderPhone();
  runConversation();
}

// ===== Testimonial Carousel =====
function initTestimonialCarousel() {
  const container = document.getElementById('testimonialCarousel');
  if (!container) return;
  let current = 0;

  function renderTestimonial() {
    const t = testimonials[current];
    container.innerHTML = `
<div class="testimonial-box">
  <div class="big-quote">\u201c</div>
  <blockquote>${t.quote}</blockquote>
  <div class="testimonial-author">
    <div class="avatar-circle"><span>${t.name[0]}</span></div>
    <div>
      <p style="font-weight:600;color:#111827">${t.name}</p>
      <p style="font-size:14px;color:#9ca3af">${t.location} &middot; \u2605\u2605\u2605\u2605\u2605</p>
    </div>
  </div>
</div>
<div class="testimonial-nav">
  <button onclick="prevTestimonial()" aria-label="Previous">${icons.chevronLeft}</button>
  <div class="dots">${testimonials.map((_, i) => `<button class="dot ${i===current?'dot-active':'dot-inactive'}" onclick="goTestimonial(${i})" aria-label="Slide ${i+1}"></button>`).join('')}</div>
  <button onclick="nextTestimonial()" aria-label="Next">${icons.chevronRight}</button>
</div>`;
  }

  window.prevTestimonial = () => { current = current === 0 ? testimonials.length - 1 : current - 1; renderTestimonial(); };
  window.nextTestimonial = () => { current = (current + 1) % testimonials.length; renderTestimonial(); };
  window.goTestimonial = (i) => { current = i; renderTestimonial(); };

  renderTestimonial();
  setInterval(() => { current = (current + 1) % testimonials.length; renderTestimonial(); }, 5000);
}

// ===== Community Tabs =====
function initCommunityTabs() {
  const tabsEl = document.getElementById('communityTabs');
  const contentEl = document.getElementById('communityContent');
  if (!tabsEl) return;
  let activeTab = 'reddit';

  function renderCommunity() {
    tabsEl.innerHTML = ['reddit','linkedin'].map(t =>
      `<button class="tab-btn ${t===activeTab?'active':''}" onclick="switchCommunityTab('${t}')">${t==='reddit'?'Reddit \u00b7 r/indianrealestate':'LinkedIn'}</button>`
    ).join('');

    const reviews = communityReviews[activeTab];
    contentEl.innerHTML = reviews.map(r => `
<div class="community-card">
  <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem">
    <div class="community-avatar" style="background:${activeTab==='reddit'?'#FF4500':'#0077B5'}"><span>${activeTab==='reddit'?'r/':'in'}</span></div>
    <div>
      <p style="font-weight:600;font-size:14px;color:#111827">${r.user}</p>
      <p style="font-size:12px;color:#9ca3af">${r.sub}</p>
    </div>
  </div>
  <p style="color:#374151;font-size:14px;line-height:1.65">${r.text}</p>
</div>`).join('');
  }

  window.switchCommunityTab = (tab) => { activeTab = tab; renderCommunity(); };
  renderCommunity();
}
